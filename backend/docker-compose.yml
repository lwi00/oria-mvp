services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: oria
      POSTGRES_USER: oria
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oria"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://oria:${DB_PASSWORD:-changeme}@db:5432/oria
      CORS_ORIGIN: https://oria-app-rho.vercel.app
      PRIVY_APP_ID: ${PRIVY_APP_ID}
      PRIVY_APP_SECRET: ${PRIVY_APP_SECRET}
      AVAX_RPC_URL: ${AVAX_RPC_URL:-https://api.avax-test.network/ext/bc/C/rpc}
      AVAX_CHAIN_ID: 43113
      MOCK_AUTH: "false"
      MOCK_STRAVA: "false"
      MOCK_YIELD: "true"
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: https://oria-app-rho.vercel.app/strava/callback

volumes:
  pgdata:
